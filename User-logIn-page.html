<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Global Education Info</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="./loginGlobalEdu.css">
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <div class="logo">
        <img src="./Images/website-logo.png" alt="Global Education Info Logo" />
      </div>
      <h2>Log in to your Account</h2>
      <p>Welcome back, please enter your details.</p>

      <form id="loginForm" onsubmit="return handleLogin(event)">
        <label>Email Address</label>
        <input type="email" id="loginEmail" placeholder="globaleducationinfo@gmail.com" required />

        <label>Password</label>
        <div class="password-wrapper">
          <input type="password" id="loginPassword" placeholder="Enter password" required />
          <span class="toggle-password"><img src="./Images/view.png" alt="Toggle Password"></span>
        </div>

        <div class="options">
          <label class="remember-btn"><input type="checkbox" id="rememberMe" /> Remember me</label>
          <a href="#">Forgot Password?</a>
        </div>

        <button type="submit" class="login-btn">Log in</button>
      </form>

      <div id="error-message" class="error-message"></div>

      <div class="divider">OR</div>

      <button class="google-btn">Continue with Google</button>

      <p class="signup-text">
        Don’t have an account? <a href="./SignUp-Page.html">Sign Up</a>
      </p>
    </div>
  </div>

  <script>
    function handleLogin(event) {
      event.preventDefault();

      const email = document.getElementById("loginEmail").value;
      const password = document.getElementById("loginPassword").value;
      const rememberMe = document.getElementById("rememberMe").checked;
      const errorMessage = document.getElementById("error-message");

      const users = JSON.parse(localStorage.getItem("users")) || [];

      // Check if user exists
      const matchedUser = users.find(user => user.email === email && user.password === password);

      if (matchedUser) {
        if (rememberMe) {
          localStorage.setItem("rememberedEmail", email);
          localStorage.setItem("rememberedPassword", password);
        } else {
          localStorage.removeItem("rememberedEmail");
          localStorage.removeItem("rememberedPassword");
        }

        alert("✅ Login successful!");
        window.location.href = "dashboard.html"; // Redirect to dashboard or home
      } else {
        errorMessage.innerText = "❌ Invalid email or password!";
      }
    }

    // Load remembered user data
    window.onload = function() {
      const savedEmail = localStorage.getItem("rememberedEmail");
      const savedPassword = localStorage.getItem("rememberedPassword");

      if (savedEmail && savedPassword) {
        document.getElementById("loginEmail").value = savedEmail;
        document.getElementById("loginPassword").value = savedPassword;
        document.getElementById("rememberMe").checked = true;
      }
    };

    // Toggle Password Visibility
    document.querySelector(".toggle-password").addEventListener("click", function() {
      const passwordInput = document.getElementById("loginPassword");
      const type = passwordInput.getAttribute("type") === "password" ? "text" : "password";
      passwordInput.setAttribute("type", type);

      this.innerHTML = type === "password"
        ? '<img src="./Images/view.png" alt="Show Password">'
        : '<img src="./Images/hide.png" alt="Hide Password">';
    });


    // Forgot Password functionality
document.addEventListener("DOMContentLoaded", () => {
  const forgotPasswordLink = document.querySelector(".options a[href='#']");
  if (forgotPasswordLink) {
    forgotPasswordLink.addEventListener("click", (e) => {
      e.preventDefault();

      const email = prompt("Enter your registered email:");
      if (!email) return;

      let users = JSON.parse(localStorage.getItem("users")) || [];
      const userIndex = users.findIndex(user => user.email === email);

      if (userIndex === -1) {
        alert("❌ No account found with this email.");
      } else {
        const newPassword = prompt("Enter your new password:");
        if (!newPassword) return;

        users[userIndex].password = newPassword;
        localStorage.setItem("users", JSON.stringify(users));
        alert("✅ Password updated successfully!");
      }
    });
  }
});


// Simulate Google Login
document.addEventListener("DOMContentLoaded", () => {
  const googleBtn = document.querySelector(".google-btn");
  if (googleBtn) {
    googleBtn.addEventListener("click", () => {
      const demoGoogleUser = {
        email: "googleuser@gmail.com",
        password: "google123"
      };

      // Add Google user to storage if not exists
      let users = JSON.parse(localStorage.getItem("users")) || [];
      const exists = users.some(user => user.email === demoGoogleUser.email);

      if (!exists) {
        users.push(demoGoogleUser);
        localStorage.setItem("users", JSON.stringify(users));
      }

      alert("✅ Logged in with Google as " + demoGoogleUser.email);
      // window.location.href = "dashboard.html";
    });
  }
});


// Inside DOMContentLoaded block:
togglePasswordSetup();
handleRememberMe();
handleSignup();
handleLogin();
handleForgotPassword();
handleGoogleLogin();


  </script>

</body>
</html>
