<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up | Global Education Info</title>
  <link rel="stylesheet" href="./loginGlobalEdu.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rubik&display=swap" rel="stylesheet">
</head>
<body class="signUp-body">
  <div class="signup-container">
    <div class="signup-box">
      <div class="logo">
        <img src="./Images/website-logo.png" alt="Global Education Info Logo" />
      </div>
      <h2>Create Your Account</h2>
      <p>Please fill in the information below.</p>

      <form id="signupForm">
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" placeholder="Enter Your full name" required />

        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="globaleducationinfo@gmail.com" required />

        <label for="password">Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" placeholder="Enter new password" required />
          <span class="toggle-password"><img src="./Images/view.png" alt=""></span>
        </div>

        <label for="confirm-password">Confirm Password</label>
        <div class="password-wrapper">
          <input type="password" id="confirm-password" placeholder="Enter confirm password" required />
          <span class="toggle-password"><img src="./Images/view.png" alt=""></span>
        </div>
        
        <label for="captcha">Enter CAPTCHA: <strong>1234</strong></label>
        <input type="text" id="captcha" placeholder="Type the text shown above" required />

        <div class="options">
          <input type="checkbox" id="terms" />
          <label for="terms">I agree to the Terms & Conditions</label>
        </div>

        <button type="submit" class="signup-btn">Sign Up</button>

        <div class="divider">OR</div>

        <button class="google-btn">Sign up with Google</button>

        <p class="login-text">Already have an account? <a href="./User-logIn-page.html">Log In</a></p>
      </form>
    </div>
  </div>

  <!-- JavaScript Code Starts -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const form = document.getElementById("signupForm");
      const fullNameInput = document.getElementById("fullname");
      const emailInput = document.getElementById("email");
      const passwordInput = document.getElementById("password");
      const confirmPasswordInput = document.getElementById("confirm-password");
      const captchaInput = document.getElementById("captcha");
      const termsCheckbox = document.getElementById("terms");

      form.addEventListener("submit", (e) => {
        e.preventDefault();

        const fullName = fullNameInput.value.trim();
        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();
        const confirmPassword = confirmPasswordInput.value.trim();
        const captcha = captchaInput.value.trim();
        const termsAccepted = termsCheckbox.checked;

        const correctCaptcha = "1234";

        if (!fullName || !email || !password || !confirmPassword || !captcha) {
          alert("❗ Please fill in all fields.");
          return;
        }

        if (password !== confirmPassword) {
          alert("❗ Passwords do not match.");
          return;
        }

        if (!termsAccepted) {
          alert("❗ You must accept the Terms & Conditions.");
          return;
        }

        if (captcha !== correctCaptcha) {
          alert("❗ CAPTCHA is incorrect.");
          return;
        }

        let users = JSON.parse(localStorage.getItem("users")) || [];
        const isExistingUser = users.some(user => user.email === email);

        if (isExistingUser) {
          alert("⚠️ This email is already registered. Please use another.");
          return;
        }

        users.push({ name: fullName, email, password });
        localStorage.setItem("users", JSON.stringify(users));

        alert("✅ Account created successfully!");
        window.location.href = "./User-logIn-page.html";
      });
    });

// Password show/hide toggle
document.querySelectorAll('.toggle-password').forEach((toggle) => {
    toggle.addEventListener('click', () => {
      const input = toggle.previousElementSibling;
      const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
      input.setAttribute('type', type);

      // Optionally change the eye icon (if used)
      toggle.innerHTML = type === 'password' 
        ? '<img src="./Images/view.png" alt="Show">' 
        : '<img src="./Images/hide.png" alt="Hide">';
    });
  });

  document.querySelectorAll('.google-btn').forEach((btn) => {
    btn.addEventListener('click', () => {
      alert("Google Sign-In feature is not implemented yet.");
    });
  });
    
  </script>
  <!-- JavaScript Code Ends -->

</body>
</html>
